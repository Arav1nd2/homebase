name: CI

on:
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run typecheck

  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run test:unit

  # Hermetic, isolated e2e run (US3): a brand-new local Supabase CLI stack is
  # provisioned fresh for every single run of this job, torn down at the end
  # regardless of outcome, and the app under test runs against the actual
  # Cloudflare Workers local preview (not plain `next dev`) so Workers
  # incompatibilities surface here, not in production. No step in this job
  # talks to any live/cloud service (FR-006, FR-007, FR-008; SC-004, SC-006).
  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - uses: supabase/setup-cli@v1
        with:
          version: latest
      - name: Start a fresh local Supabase stack
        run: supabase start
      - name: Apply migrations to the fresh local stack
        run: npm run db:migrate:local
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
      # `npm run test:e2e` (playwright.config.ts's `webServer`) builds,
      # starts, and waits for the real Workers preview itself, then tears it
      # down after — no manual build/background-start/curl-poll steps here.
      # It resolves the database purely through the Hyperdrive binding (its
      # `localConnectionString` in wrangler.jsonc), the same code path
      # production uses — no DATABASE_URL is set for this step. A fallback
      # here would mask bugs in that binding-access code, which is exactly
      # what happened before this comment was added (a broken binding check
      # silently fell back to a working DATABASE_URL in CI).
      - name: Run Playwright e2e tests
        run: npm run test:e2e
      - name: Tear down the local Supabase stack (always, so no state leaks between runs)
        if: always()
        run: supabase stop --no-backup
