name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
      - run: npm run lint

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
      - run: npm run typecheck

  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
      - run: npm run test:unit

  # Hermetic, isolated e2e run (US3): a brand-new local Supabase CLI stack is
  # provisioned fresh for every single run of this job, torn down at the end
  # regardless of outcome, and the app under test runs against the actual
  # Cloudflare Workers local preview (not plain `next dev`) so Workers
  # incompatibilities surface here, not in production. No step in this job
  # talks to any live/cloud service (FR-006, FR-007, FR-008; SC-004, SC-006).
  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
      # None of these are sensitive in the sense of protecting something
      # real — SUPABASE_URL/SUPABASE_PUBLISHABLE_KEY are fixed,
      # publicly-known values baked into every local Supabase CLI instance
      # (not project-specific); ALLOWED_EMAILS is just test data matching
      # what the e2e specs use; CI_SEND_EMAIL_HOOK_SECRET only has to match
      # between these two files within this one ephemeral CI run, not
      # anything in production; and the Resend values are never actually
      # sent to Resend, since RESEND_BASE_URL points the send-email Worker
      # at the fake capture server instead (see
      # specs/002-email-otp-auth/research.md §10). Still kept as repo
      # secrets (CI_* prefix, distinct from the production-scoped secrets
      # of similar purpose) rather than hardcoded in this file, so nothing
      # here has to be treated as a trusted constant just because it's
      # committed in the clear.
      - name: Create local secrets files for CI
        env:
          CI_SUPABASE_URL: ${{ secrets.CI_SUPABASE_URL }}
          CI_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.CI_SUPABASE_PUBLISHABLE_KEY }}
          CI_ALLOWED_EMAILS: ${{ secrets.CI_ALLOWED_EMAILS }}
          CI_SEND_EMAIL_HOOK_SECRET: ${{ secrets.CI_SEND_EMAIL_HOOK_SECRET }}
          CI_RESEND_API_KEY: ${{ secrets.CI_RESEND_API_KEY }}
          CI_RESEND_FROM_ADDRESS: ${{ secrets.CI_RESEND_FROM_ADDRESS }}
        run: |
          echo "SEND_EMAIL_HOOK_SECRET=$CI_SEND_EMAIL_HOOK_SECRET" > .env
          cat > packages/web/.dev.vars <<EOF
          SUPABASE_URL=$CI_SUPABASE_URL
          SUPABASE_PUBLISHABLE_KEY=$CI_SUPABASE_PUBLISHABLE_KEY
          ALLOWED_EMAILS=$CI_ALLOWED_EMAILS
          EOF
          cat > packages/send-email/.dev.vars <<EOF
          SEND_EMAIL_HOOK_SECRET=$CI_SEND_EMAIL_HOOK_SECRET
          RESEND_API_KEY=$CI_RESEND_API_KEY
          RESEND_FROM_ADDRESS="$CI_RESEND_FROM_ADDRESS"
          RESEND_BASE_URL=http://localhost:9999
          EOF
      - uses: supabase/setup-cli@v1
        with:
          version: 2.109.1
      - name: Start a fresh local Supabase stack
        run: supabase start
      - name: Apply migrations to the fresh local stack
        run: npm run db:migrate:local
      - name: Install Playwright's Chromium
        run: npx playwright install --with-deps chromium
      # `npm run test:e2e` (playwright.config.ts's `webServer`) builds,
      # starts, and waits for the real Workers preview itself, then tears it
      # down after — no manual build/background-start/curl-poll steps here.
      # It resolves the database purely through the Hyperdrive binding (its
      # `localConnectionString` in wrangler.jsonc), the same code path
      # production uses — no DATABASE_URL is set for this step. A fallback
      # here would mask bugs in that binding-access code, which is exactly
      # what happened before this comment was added (a broken binding check
      # silently fell back to a working DATABASE_URL in CI).
      - name: Run Playwright e2e tests
        run: npm run test:e2e
      - name: Tear down the local Supabase stack (always, so no state leaks between runs)
        if: always()
        run: supabase stop --no-backup
