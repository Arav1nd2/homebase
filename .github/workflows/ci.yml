name: CI

on:
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run typecheck

  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run test:unit

  # Hermetic, isolated e2e run (US3): a brand-new local Supabase CLI stack is
  # provisioned fresh for every single run of this job, torn down at the end
  # regardless of outcome, and the app under test runs against the actual
  # Cloudflare Workers local preview (not plain `next dev`) so Workers
  # incompatibilities surface here, not in production. No step in this job
  # talks to any live/cloud service (FR-006, FR-007, FR-008; SC-004, SC-006).
  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      # Pinned (not "latest") so this exactly matches the `supabase`
      # devDependency version used locally (package.json), and so the
      # Docker image cache key below stays stable — bump both together.
      - uses: supabase/setup-cli@v1
        with:
          version: 2.109.1
      # The Supabase CLI pulls several Docker images (Postgres, GoTrue,
      # PostgREST, Kong, Storage, etc.) on first `supabase start`. Cache
      # them as a single tarball so subsequent runs load from cache instead
      # of re-pulling every image over the network. Keyed on the CLI
      # version + config.toml's hash, since either can change which image
      # tags get pulled.
      - name: Restore cached Supabase Docker images
        id: docker-cache
        uses: actions/cache@v4
        with:
          path: /tmp/supabase-docker-images.tar
          key: supabase-docker-images-2.109.1-${{ hashFiles('supabase/config.toml') }}
      - name: Load cached Docker images
        if: steps.docker-cache.outputs.cache-hit == 'true'
        run: docker load -i /tmp/supabase-docker-images.tar
      - name: Start a fresh local Supabase stack
        run: supabase start
      - name: Save Docker images to cache
        if: steps.docker-cache.outputs.cache-hit != 'true'
        run: docker save -o /tmp/supabase-docker-images.tar $(docker images -q)
      - name: Apply migrations to the fresh local stack
        run: npm run db:migrate:local
      # Chromium's binary (~100MB+) is the expensive part of `playwright
      # install`; cache it keyed on the resolved @playwright/test version so
      # a matching version never re-downloads it. OS-level dependencies
      # (apt packages) aren't part of this cache — they're cheap and always
      # installed via `install-deps` regardless of cache hit/miss.
      - name: Get installed Playwright version
        id: playwright-version
        run: echo "version=$(node -p "require('@playwright/test/package.json').version")" >> "$GITHUB_OUTPUT"
      - name: Restore cached Playwright browser binaries
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ steps.playwright-version.outputs.version }}
      - name: Install Playwright's Chromium (cache miss only)
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium
      - name: Install Playwright's OS dependencies only (cache hit)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium
      # `npm run test:e2e` (playwright.config.ts's `webServer`) builds,
      # starts, and waits for the real Workers preview itself, then tears it
      # down after — no manual build/background-start/curl-poll steps here.
      # It resolves the database purely through the Hyperdrive binding (its
      # `localConnectionString` in wrangler.jsonc), the same code path
      # production uses — no DATABASE_URL is set for this step. A fallback
      # here would mask bugs in that binding-access code, which is exactly
      # what happened before this comment was added (a broken binding check
      # silently fell back to a working DATABASE_URL in CI).
      - name: Run Playwright e2e tests
        run: npm run test:e2e
      - name: Tear down the local Supabase stack (always, so no state leaks between runs)
        if: always()
        run: supabase stop --no-backup
