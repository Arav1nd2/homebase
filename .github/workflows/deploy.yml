name: Deploy

on:
  push:
    branches: [main]
  # Lets a secret-only change (e.g. updating ALLOWED_EMAILS) be synced to
  # Cloudflare without needing an empty commit — see the "Sync auth
  # secrets" step below and README.md "Signing in".
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    # Manual-approval gate (FR-012, FR-013): GitHub pauses this job until a
    # required reviewer on the "production" Environment approves it. This
    # Environment and its required reviewer must be configured once in the
    # repo's GitHub settings — see README.md "CI/CD (GitHub, manual one-time
    # setup)". Only runs after this workflow triggers, which itself only
    # happens on push to main — i.e. after PR checks in ci.yml already
    # passed (FR-013: approval strictly after automated checks).
    environment: production
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      # FR-009 / G1: keep production's schema in lockstep with the same
      # migration history local/CI use — never let it drift.
      - name: Apply migrations to production
        run: npx drizzle-kit migrate
        env:
          DATABASE_URL: ${{ secrets.PRODUCTION_DATABASE_URL }}
      - name: Build for Cloudflare Workers (OpenNext)
        run: npm run build:workers
      - name: Deploy to Cloudflare Workers
        run: npm run deploy:workers
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      # GitHub Actions secrets are this project's single secret manager
      # (constitution Additional Constraints) — every deploy pushes their
      # current values to the Worker, so Cloudflare's copy can never drift
      # from what's set in GitHub. `wrangler secret put` updates the live
      # secret in place; it doesn't require a redeploy on its own, but
      # running it here means updating a GitHub secret and re-running this
      # workflow (push or workflow_dispatch) is the only step needed.
      - name: Sync auth secrets to the Worker
        run: |
          echo "${{ secrets.SUPABASE_URL }}" | npx wrangler secret put SUPABASE_URL
          echo "${{ secrets.SUPABASE_PUBLISHABLE_KEY }}" | npx wrangler secret put SUPABASE_PUBLISHABLE_KEY
          echo "${{ secrets.ALLOWED_EMAILS }}" | npx wrangler secret put ALLOWED_EMAILS
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      # No test/smoke step runs against production here, deliberately — see
      # constitution Principle VI's Environment Parity rule. Correctness is
      # established by ci.yml's e2e job running the exact same binding-access
      # code path (real Workers runtime via local preview) before this
      # workflow ever runs, not by writing to the live database.
